name: Publish @inlog/ds

# Se déclenche quand on pousse un tag vX.Y.Z (ex: v1.0.0, v1.2.3)
on:
  push:
    tags:
      - 'v*.*.*'

  # Permet aussi de lancer manuellement depuis l'onglet Actions sur GitHub
  workflow_dispatch:
    inputs:
      version:
        description: 'Version à publier (ex: 1.0.1)'
        required: false

jobs:
  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # ← nécessaire pour publier sur GitHub Packages

    steps:
      # 1. Récupérer le code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Configurer Node avec le registry GitHub Packages
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@inlog'

      # 3. (Optionnel) Bumper la version si lancé manuellement avec un numéro
      - name: Bump version
        if: github.event.inputs.version != ''
        run: npm version ${{ github.event.inputs.version }} --no-git-tag-version

      # 4. Publier
      - name: Publish package
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 5. Afficher un résumé
      - name: Summary
        run: |
          echo "## ✅ @inlog/ds publié avec succès" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version :** $(node -p "require('./package.json').version")" >> $GITHUB_STEP_SUMMARY
          echo "**Registry :** https://npm.pkg.github.com" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Installation dans un projet :" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "npm install @inlog/ds" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
